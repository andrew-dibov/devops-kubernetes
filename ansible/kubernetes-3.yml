---
- name: "K8s : install kubernetes"
  hosts: all
  become: true
  gather_facts: true

  vars_files: "variables/variables.common.yml"

  vars:
    base_url: https://dl.k8s.io/v{{ kubernetes_version }}/bin/linux/amd64
    kubelet_service: https://raw.githubusercontent.com/kubernetes/release/v0.16.2/cmd/krel/templates/latest/kubelet/kubelet.service
    kubeadm_config: https://raw.githubusercontent.com/kubernetes/release/v0.16.2/cmd/krel/templates/latest/kubeadm/10-kubeadm.conf

  handlers:
    - name: "K8s : install kubernetes : restart service"
      ansible.builtin.systemd:
        name: kubelet
        state: restarted
        daemon_reload: true

  tasks:
    - name: "K8s : install kubernetes : create temp dir"
      ansible.builtin.tempfile:
        suffix: temp-
        state: directory
      register: temp

    - name: "K8s : install kubernetes : get kubeadm bin"
      ansible.builtin.get_url:
        url: "{{ base_url }}/kubeadm"
        dest: "{{ temp.path }}/kubeadm"
        owner: root
        group: root
        mode: 0755
        force: false
      register: bin_kubeadm

    - name: "K8s : install kubernetes : install kubeadm bin"
      ansible.builtin.copy:
        src: "{{ temp.path }}/kubeadm"
        dest: /usr/bin
        owner: root
        group: root
        mode: 0755
        remote_src: true
      when: bin_kubeadm is changed

    - name: "K8s : install kubernetes : get kubelet bin"
      ansible.builtin.get_url:
        url: "{{ base_url }}/kubelet"
        dest: "{{ temp.path }}/kubelet"
        owner: root
        group: root
        mode: 0755
        force: false
      register: bin_kubelet

    - name: "K8s : install kubernetes : install kubelet bin"
      ansible.builtin.copy:
        src: "{{ temp.path }}/kubelet"
        dest: /usr/bin
        owner: root
        group: root
        mode: 0755
        remote_src: true
      when: bin_kubelet is changed

    - name: "K8s : install kubernetes : get kubectl bin"
      ansible.builtin.get_url:
        url: "{{ base_url }}/kubectl"
        dest: "{{ temp.path }}/kubectl"
        owner: root
        group: root
        mode: 0755
        force: false
      register: bin_kubectl

    - name: "K8s : install kubernetes : install kubectl bin"
      ansible.builtin.copy:
        src: "{{ temp.path }}/kubectl"
        dest: /usr/bin
        owner: root
        group: root
        mode: 0755
        remote_src: true
      when: bin_kubectl is changed

    - name: "K8s : install kubernetes : remove bins"
      ansible.builtin.file:
        path: "{{ temp.path }}/{{ item }}"
        state: absent
      loop:
        - kubeadm
        - kubelet
        - kubectl
      changed_when: false

    - name: "K8s : install kubernetes : ensure service dir"
      ansible.builtin.file:
        path: /etc/systemd/system/kubelet.service.d
        state: directory
        owner: root
        group: root
        mode: 0755

    - name: "K8s : install kubernetes : get kubelet service"
      ansible.builtin.get_url:
        url: "{{ kubelet_service }}"
        dest: /etc/systemd/system/kubelet.service
        owner: root
        group: root
        mode: 0644
      notify: "K8s : install kubernetes : restart service"

    - name: "K8s : install kubernetes : get kubeadm config"
      ansible.builtin.get_url:
        url: "{{ kubeadm_config }}"
        dest: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
        owner: root
        group: root
        mode: 0644
      notify: "K8s : install kubernetes : restart service"

    - name: "K8s : install kubernetes : enable service"
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started
        daemon_reload: true

    - name: "K8s : install kubernetes : remove temp dir"
      ansible.builtin.file:
        path: "{{ temp.path }}"
        state: absent
      changed_when: false
